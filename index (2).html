<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#05080c">
<title>沪指摩托 · 骑车冲上6124</title>
<meta property="og:title" content="沪指摩托 · 你能骑多远？">
<meta property="og:description" content="在二十年上证走势上骑摩托：冲6124、过熔断底、逃顶。点开试试你的车技。">
<meta property="og:type" content="website">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#05080c;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    color:#e6edf2; touch-action:none; overscroll-behavior:none; }
  #game { display:block; position:fixed; inset:0; }
  .mono { font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-variant-numeric:tabular-nums; }

  /* HUD */
  #hud { position:fixed; top:0; left:0; right:0; padding:12px 14px; display:flex; align-items:flex-start;
    justify-content:space-between; pointer-events:none; z-index:5; }
  #hudLeft .row1 { font-size:13px; letter-spacing:2px; color:#7a8590; }
  #hudLeft .idx { font-size:30px; font-weight:700; line-height:1.05; }
  #hudLeft .idx #hudArrow { font-size:18px; }
  #hudLeft .sub { font-size:12px; color:#7a8590; margin-top:2px; }
  #hudLeft .sub b { color:#aeb6bd; font-weight:600; }
  #hudStatus { font-size:13px; letter-spacing:1px; color:#7a8590; margin-top:6px; }
  #muteBtn { pointer-events:auto; font-size:20px; background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08); border-radius:10px; width:40px; height:40px; color:#cfd8dc; }

  /* 触控区 + 可见踏板 */
  #zones { position:fixed; inset:0; display:flex; z-index:3; }
  #zoneL,#zoneR { flex:1; display:flex; align-items:flex-end; justify-content:center; padding-bottom:26px; }
  .pedal { width:128px; max-width:42vw; padding:14px 0 10px; border-radius:18px; text-align:center;
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.14);
    backdrop-filter:blur(2px); transition:transform .05s, background .08s; }
  .pedal.gas { background:rgba(45,224,192,0.12); border-color:rgba(45,224,192,0.45); }
  .pedal .picon { font-size:22px; letter-spacing:2px; color:#cfd8dc; }
  .pedal.gas .picon { color:#2de0c0; }
  .pedal .ptext { font-size:19px; font-weight:800; letter-spacing:4px; margin-top:2px; color:#e6edf2; }
  .pedal .psub { font-size:11px; letter-spacing:3px; color:#7a8590; margin-top:1px; }
  .pedal.on { transform:scale(0.94); background:rgba(255,255,255,0.16); }
  .pedal.gas.on { background:rgba(45,224,192,0.30); }
  .pedal.pulse { animation:pedalPulse 1s ease-in-out infinite; }
  @keyframes pedalPulse { 0%,100%{ box-shadow:0 0 0 0 rgba(45,224,192,0); } 50%{ box-shadow:0 0 0 8px rgba(45,224,192,0.10); transform:translateY(-3px); } }

  /* 新手箭头提示 */
  .coach { position:fixed; inset:0; z-index:4; display:flex; justify-content:space-between;
    align-items:flex-end; padding:0 8vw 120px; pointer-events:none; }
  .coach .chint { font-size:15px; line-height:1.5; color:#cfd8dc; text-align:center;
    background:rgba(6,12,18,0.75); border:1px solid rgba(45,224,192,0.3); border-radius:12px;
    padding:10px 14px; animation:coachFloat 1.1s ease-in-out infinite; }
  .coach .chint b { color:#2de0c0; }
  @keyframes coachFloat { 0%,100%{ transform:translateY(0); opacity:.85; } 50%{ transform:translateY(-6px); opacity:1; } }

  /* 覆盖层 */
  .overlay { position:fixed; inset:0; z-index:10; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:24px;
    background:radial-gradient(120% 120% at 50% 30%, rgba(6,12,18,0.78), rgba(4,7,11,0.96)); }
  .badge { font-size:12px; letter-spacing:3px; color:#2de0c0; border:1px solid rgba(45,224,192,0.4);
    border-radius:999px; padding:6px 14px; margin-bottom:18px; }
  .title { font-size:40px; font-weight:800; letter-spacing:1px; line-height:1.1; }
  .title .red { color:#ff3b3b; }
  .desc { margin-top:14px; color:#9aa4ad; font-size:15px; max-width:340px; line-height:1.6; }
  .keys { margin-top:18px; color:#7a8590; font-size:13px; line-height:1.9; }
  .keys b { color:#2de0c0; }
  .btn { margin-top:26px; background:#2de0c0; color:#04221d; font-weight:800; font-size:18px;
    letter-spacing:2px; border:none; border-radius:14px; padding:15px 46px; box-shadow:0 8px 30px rgba(45,224,192,0.25); }
  .btn:active { transform:translateY(1px); }
  .small { margin-top:14px; font-size:12px; color:#5f6a72; }

  .cstat { display:flex; gap:34px; margin-top:18px; }
  .cstat .n { font-size:34px; font-weight:800; }
  .cstat .l { font-size:12px; color:#7a8590; letter-spacing:1px; margin-top:2px; }
  .cmsg { margin-top:16px; color:#ffd2d2; font-size:16px; }
  .credit { position:fixed; bottom:8px; right:10px; font-size:11px; color:#3a444c; z-index:6; }
</style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="zones">
    <div id="zoneL"><div class="pedal" id="btnBrake"><div class="picon">◀◀</div><div class="ptext">刹车</div><div class="psub">按住</div></div></div>
    <div id="zoneR"><div class="pedal gas" id="btnGas"><div class="picon">▶▶</div><div class="ptext">油门</div><div class="psub">按住</div></div></div>
  </div>

  <div id="coach" class="coach" style="display:none">
    <div class="chint">← 按住左边<br><b>刹车 / 后仰</b></div>
    <div class="chint">按住右边 →<br><b>油门 / 冲坡</b></div>
  </div>

  <div id="hud">
    <div id="hudLeft">
      <div class="row1">上证指数</div>
      <div class="idx mono"><span id="hudIdx">3000</span> <span id="hudArrow">▲</span></div>
      <div class="sub">距离 <b id="hudDist" class="mono">0</b> 米 · 最高 <b id="hudPeak" class="mono">0</b></div>
      <div id="hudStatus">在路上</div>
    </div>
    <button id="muteBtn">🔊</button>
  </div>

  <div id="startScreen" class="overlay">
    <div class="badge">A 股车技挑战</div>
    <div class="title">沪指<span class="red">摩托</span></div>
    <div class="desc">从 998 千点底出发,翻 6124、栽 1664、冲 5178、过熔断与疫情底……骑完 A 股二十年。<br>一句话操作:<b style="color:#2de0c0">右边油门,左边刹车,冲就完了。</b></div>
    <div class="keys">电脑端:<b>→</b> 油门　<b>←</b> 刹车　<b>R</b> 重开</div>
    <button id="startBtn" class="btn">开 始</button>
    <div class="small" id="bestLabel">头朝下落地就收盘，悠着点</div>
  </div>

  <div id="crashScreen" class="overlay" style="display:none">
    <div class="badge" id="crashTitle">收盘 / 爆仓</div>
    <div class="cmsg" id="crashMsg"></div>
    <div class="cstat">
      <div><div class="n mono" id="crashDist">0</div><div class="l">骑行距离 (米)</div></div>
      <div><div class="n mono" id="crashPeak">0</div><div class="l">触及最高点</div></div>
    </div>
    <button id="retryBtn" class="btn">再 来 一 局</button>
    <div class="small">截图发群里,看谁车技好 🏍️</div>
  </div>

  <div class="credit">沪指摩托 · 走势为近似演示</div>

  <script>/* 沪指摩托 —— 在上证指数走势上骑车  (依赖全局 Matter) */
(function () {
  'use strict';

  var M = window.Matter;
  var Engine = M.Engine, Composite = M.Composite, Bodies = M.Bodies,
      Body = M.Body, Constraint = M.Constraint, Events = M.Events;

  /* ===================== 手感参数（想调难度/手感改这里） ===================== */
  var PARAMS = {
    GRAVITY: 1.0,        // 重力
    DRIVE: 0.0019,       // 油门推力（相对车重）；调大=更猛
    BRAKE: 0.0011,       // 刹车/倒车力
    AIR_TORQUE: 0.9,     // 腾空翻转力（前空翻/后空翻）
    WHEEL_TORQUE: 0.03,  // 轮子扭矩（视觉/抓地）
    VMAX: 9.5,           // 水平限速（油门到此不再加力）
    SPEED_LIMIT: 26,     // 总体限速（防止穿地）
    WHEEL_R: 22,         // 轮子半径
    WHEELBASE: 60,       // 轴距
    VAL_SCALE: 0.10,     // 1 个指数点 = 多少像素高度
    PT_DX: 150,          // 相邻节点在赛道上的水平间距
    SUB: 3               // 平滑细分（越大越平滑、物体越多）
  };

  /* ===================== 赛道：上证指数二十年关键节点（按时间顺序） ===================== */
  // 每项 [点位, 路标(年份·点位·事件) 或 null]；中间无名点用于让坡度可骑
  var SERIES = [
    [2245, null],                         // 出生平台
    [2245, '2001 · 2245 老顶'],
    [1500, null],
    [998,  '2005 · 998 千点底'],
    [1900, null], [2950, null], [4000, null], [5050, null],
    [6124, '2007 · 6124 历史大顶'],
    [4200, null], [2800, null],
    [1664, '2008 · 1664 危机底'],
    [2600, null],
    [3478, '2009 · 3478 四万亿'],
    [2500, null],
    [1849, '2013 · 1849 钻石底'],
    [2850, null], [3900, null], [4950, null],
    [5178, '2015 · 5178 杠杆牛'],
    [4000, null], [3100, null],
    [2638, '2016 · 2638 熔断底'],
    [3150, null],
    [3587, '2018 · 3587 牛回头'],
    [2950, null],
    [2440, '2019 · 2440 政策底'],
    [2900, null],
    [2646, '2020 · 2646 疫情底'],
    [3250, null],
    [3731, '2021 · 3731 核心资产'],
    [3300, null],
    [2885, '2022 · 2885 磨底'],
    [3400, null],
    [2635, '2024 · 2635 二十年底'],
    [3100, null],
    [3674, '2024 · 924 行情'],
    [3300, null],
    [4000, '2026 · 冲击新高?']
  ];

  /* ===================== 全局状态 ===================== */
  var canvas, ctx, W = 0, H = 0, dpr = 1;
  var engine, world;
  var bike = null;                 // {rear, front, chassis, head, group}
  var groundBodies = [];
  var points = [];                 // 细分后的赛道点 {x,y,v}
  var flags = [];                  // 路标 {x,y,text}
  var minV, maxV, baseY, maxGroundY, startX, finishX;
  var cam = { x: 0, y: 0 };
  var state = 'ready';             // ready | playing | crashed | win
  var input = { gas: false, brake: false };
  var groundCount = 0;
  var airTime = 0, bestDist = 0, crashMsg = '';
  var lastDir = 0;                 // 1 up / -1 down for HUD arrow

  /* ===================== 工具 ===================== */
  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
  function valueAtX(x) {
    if (x <= points[0].x) return points[0].v;
    var lo = 0, hi = points.length - 1;
    if (x >= points[hi].x) return points[hi].v;
    while (hi - lo > 1) { var mid = (lo + hi) >> 1; if (points[mid].x < x) lo = mid; else hi = mid; }
    var p0 = points[lo], p1 = points[hi];
    var t = (x - p0.x) / (p1.x - p0.x);
    return lerp(p0.v, p1.v, t);
  }
  function fmt(n) { return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

  /* ===================== 构建赛道 ===================== */
  function buildTerrain() {
    var vals = [], labels = [];
    for (var i = 0; i < SERIES.length; i++) { vals.push(SERIES[i][0]); labels.push(SERIES[i][1]); }
    minV = Math.min.apply(null, vals);
    maxV = Math.max.apply(null, vals);
    var pad = 320;
    baseY = (maxV - minV) * PARAMS.VAL_SCALE + pad;      // 最低点对应的 y
    function vy(v) { return baseY - (v - minV) * PARAMS.VAL_SCALE; }

    // 控制点
    var ctrl = [];
    for (i = 0; i < vals.length; i++) {
      ctrl.push({ x: 200 + i * PARAMS.PT_DX, v: vals[i], y: vy(vals[i]), label: labels[i] });
    }
    // 余弦平滑细分
    points = [];
    for (i = 0; i < ctrl.length - 1; i++) {
      var a = ctrl[i], b = ctrl[i + 1];
      for (var k = 0; k < PARAMS.SUB; k++) {
        var t = k / PARAMS.SUB;
        var ct = (1 - Math.cos(t * Math.PI)) / 2;
        points.push({ x: lerp(a.x, b.x, t), y: lerp(a.y, b.y, ct), v: lerp(a.v, b.v, ct) });
      }
    }
    points.push({ x: ctrl[ctrl.length - 1].x, y: ctrl[ctrl.length - 1].y, v: ctrl[ctrl.length - 1].v });

    // 路标
    flags = [];
    for (i = 0; i < ctrl.length; i++) { if (ctrl[i].label) flags.push({ x: ctrl[i].x, y: ctrl[i].y, text: ctrl[i].label }); }

    maxGroundY = baseY;
    startX = points[2].x;
    finishX = points[points.length - 2].x;

    // 物理：每个细分段做一块斜板
    groundBodies = [];
    var TH = 80;
    for (i = 0; i < points.length - 1; i++) {
      var p0 = points[i], p1 = points[i + 1];
      var dx = p1.x - p0.x, dy = p1.y - p0.y;
      var len = Math.sqrt(dx * dx + dy * dy);
      if (len < 0.5) continue;
      var ang = Math.atan2(dy, dx);
      var nx = -Math.sin(ang), ny = Math.cos(ang); // 法线
      if (ny < 0) { nx = -nx; ny = -ny; }           // 指向下方
      var mx = (p0.x + p1.x) / 2 + nx * (TH / 2);
      var my = (p0.y + p1.y) / 2 + ny * (TH / 2);
      var slab = Bodies.rectangle(mx, my, len + 2, TH, {
        isStatic: true, angle: ang, friction: 1, label: 'ground'
      });
      groundBodies.push(slab);
    }
    Composite.add(world, groundBodies);
  }

  /* ===================== 构建摩托 ===================== */
  function buildBike() {
    var group = Body.nextGroup(true);
    var sx = startX, sy = valueAtXfromPoints(sx) - 70;
    var R = PARAMS.WHEEL_R, WB = PARAMS.WHEELBASE;

    var rear = Bodies.circle(sx - WB / 2, sy, R, {
      collisionFilter: { group: group }, density: 0.0016, friction: 1.4,
      frictionStatic: 3, restitution: 0.02, label: 'wheel'
    });
    var front = Bodies.circle(sx + WB / 2, sy, R, {
      collisionFilter: { group: group }, density: 0.0016, friction: 1.4,
      frictionStatic: 3, restitution: 0.02, label: 'wheel'
    });
    var chassis = Bodies.rectangle(sx, sy - 12, WB, 14, {
      collisionFilter: { group: group }, density: 0.0009, label: 'chassis'
    });
    var head = Bodies.circle(sx + 6, sy - 40, 9, {
      collisionFilter: { group: group }, density: 0.001, label: 'head'
    });

    function pin(body, point) {
      return Constraint.create({
        bodyA: chassis, pointA: point, bodyB: body, pointB: { x: 0, y: 0 },
        stiffness: 0.95, length: 0, damping: 0.1
      });
    }
    var c1 = pin(rear, { x: -WB / 2, y: 8 });
    var c2 = pin(front, { x: WB / 2, y: 8 });
    var c3 = pin(head, { x: 6, y: -28 });

    Composite.add(world, [rear, front, chassis, head, c1, c2, c3]);
    bike = { rear: rear, front: front, chassis: chassis, head: head, group: group };
  }

  // 用 points 直接取 y（建车时 valueAtX 走 v，这里要 y）
  function valueAtXfromPoints(x) {
    var lo = 0, hi = points.length - 1;
    while (hi - lo > 1) { var mid = (lo + hi) >> 1; if (points[mid].x < x) lo = mid; else hi = mid; }
    var p0 = points[lo], p1 = points[hi];
    var t = (x - p0.x) / (p1.x - p0.x);
    return lerp(p0.y, p1.y, t);
  }

  /* ===================== 碰撞事件 ===================== */
  function isPair(pair, l1, l2) {
    var a = pair.bodyA.label, b = pair.bodyB.label;
    return (a === l1 && b === l2) || (a === l2 && b === l1);
  }
  function wireEvents() {
    Events.on(engine, 'collisionStart', function (e) {
      for (var i = 0; i < e.pairs.length; i++) {
        var p = e.pairs[i];
        if (isPair(p, 'wheel', 'ground')) groundCount++;
        if (state === 'playing' && isPair(p, 'head', 'ground')) crash('套牢了！头铁也扛不住跳水 📉');
      }
    });
    Events.on(engine, 'collisionEnd', function (e) {
      for (var i = 0; i < e.pairs.length; i++) {
        if (isPair(e.pairs[i], 'wheel', 'ground')) groundCount = Math.max(0, groundCount - 1);
      }
    });
  }

  /* ===================== 控制 ===================== */
  function applyControls() {
    if (!bike) return;
    var grounded = groundCount > 0;
    var ch = bike.chassis;
    var massTotal = ch.mass + bike.rear.mass + bike.front.mass + bike.head.mass;

    if (input.gas) {
      if (grounded) {
        if (ch.velocity.x < PARAMS.VMAX) Body.applyForce(ch, ch.position, { x: massTotal * PARAMS.DRIVE, y: 0 });
        bike.rear.torque = PARAMS.WHEEL_TORQUE;
        bike.front.torque = PARAMS.WHEEL_TORQUE * 0.5;
      } else {
        ch.torque = -PARAMS.AIR_TORQUE; // 后空翻
      }
    }
    if (input.brake) {
      if (grounded) {
        if (ch.velocity.x > -PARAMS.VMAX * 0.4) Body.applyForce(ch, ch.position, { x: -massTotal * PARAMS.BRAKE, y: 0 });
        bike.rear.torque = -PARAMS.WHEEL_TORQUE * 0.6;
        bike.front.torque = -PARAMS.WHEEL_TORQUE * 0.6;
      } else {
        ch.torque = PARAMS.AIR_TORQUE; // 前空翻
      }
    }
  }

  function clampSpeed(body) {
    var v = body.velocity, sp = Math.sqrt(v.x * v.x + v.y * v.y);
    if (sp > PARAMS.SPEED_LIMIT) {
      var f = PARAMS.SPEED_LIMIT / sp;
      Body.setVelocity(body, { x: v.x * f, y: v.y * f });
    }
  }

  /* ===================== 游戏流程 ===================== */
  function startGame() {
    Composite.clear(world, false);          // 清空（含上一局/预览赛道）
    bike = null; groundBodies = [];
    groundCount = 0; airTime = 0; lastDir = 0;
    bestPeak = 0; dust.length = 0;
    buildTerrain();
    buildBike();
    cam.x = bike.chassis.position.x - W * 0.32 / scale();
    cam.y = bike.chassis.position.y - H * 0.5 / scale();
    state = 'playing';
    hideOverlays();
    showCoach();
    initAudio();
  }

  function crash(msg) {
    if (state !== 'playing') return;
    state = 'crashed';
    crashMsg = msg || '炸了 💥';
    soundCrash();
    showCrash();
  }
  function win() {
    if (state !== 'playing') return;
    state = 'win';
    crashMsg = '🏁 二十年行情骑到底,见证 A 股新征程!';
    showCrash();
  }

  /* ===================== 渲染 ===================== */
  function scale() { return clamp(W / 1100, 0.34, 0.95); }
  function W2Sx(x) { return (x - cam.x) * scale(); }
  function W2Sy(y) { return (y - cam.y) * scale(); }

  function render() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    // 背景渐变
    var g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#05080c'); g.addColorStop(1, '#0a0f15');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    drawGrid();
    if (points.length) { drawTerrain(); drawFlags(); }
    if (bike) drawBike();
    drawDust();
  }

  function drawGrid() {
    ctx.strokeStyle = 'rgba(40,70,80,0.18)'; ctx.lineWidth = 1;
    var step = 90;
    var ox = (-cam.x * scale()) % step;
    for (var x = ox; x < W; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    var oy = (-cam.y * scale()) % step;
    for (var y = oy; y < H; y += step) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  }

  function visibleRange() {
    var x0 = cam.x - 50 / scale(), x1 = cam.x + (W + 50) / scale();
    var lo = 0, hi = points.length - 1;
    while (lo < points.length && points[lo].x < x0) lo++;
    var hiI = points.length - 1;
    for (var i = lo; i < points.length; i++) { if (points[i].x > x1) { hiI = i; break; } }
    return [Math.max(0, lo - 1), Math.min(points.length - 1, hiI + 1)];
  }

  function drawTerrain() {
    var r = visibleRange(), lo = r[0], hi = r[1], i;
    // 面积填充
    ctx.beginPath();
    ctx.moveTo(W2Sx(points[lo].x), W2Sy(points[lo].y));
    for (i = lo + 1; i <= hi; i++) ctx.lineTo(W2Sx(points[i].x), W2Sy(points[i].y));
    ctx.lineTo(W2Sx(points[hi].x), H + 20);
    ctx.lineTo(W2Sx(points[lo].x), H + 20);
    ctx.closePath();
    var fg = ctx.createLinearGradient(0, 0, 0, H);
    fg.addColorStop(0, 'rgba(45,224,192,0.10)'); fg.addColorStop(1, 'rgba(45,224,192,0.01)');
    ctx.fillStyle = fg; ctx.fill();
    // 发光线
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.strokeStyle = 'rgba(45,224,192,0.25)'; ctx.lineWidth = 7;
    strokePath(lo, hi);
    ctx.strokeStyle = '#2de0c0'; ctx.lineWidth = 2.2;
    strokePath(lo, hi);
  }
  function strokePath(lo, hi) {
    ctx.beginPath();
    ctx.moveTo(W2Sx(points[lo].x), W2Sy(points[lo].y));
    for (var i = lo + 1; i <= hi; i++) ctx.lineTo(W2Sx(points[i].x), W2Sy(points[i].y));
    ctx.stroke();
  }

  function drawFlags() {
    ctx.font = '700 12px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    for (var i = 0; i < flags.length; i++) {
      var f = flags[i], sx = W2Sx(f.x), sy = W2Sy(f.y);
      if (sx < -160 || sx > W + 160) continue;
      // 旗杆
      ctx.strokeStyle = 'rgba(255,90,90,0.65)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx, sy - 48); ctx.stroke();
      // 小红旗
      ctx.fillStyle = 'rgba(255,70,70,0.92)';
      ctx.beginPath(); ctx.moveTo(sx, sy - 48); ctx.lineTo(sx + 26, sy - 43); ctx.lineTo(sx, sy - 38); ctx.closePath(); ctx.fill();
      // 地面标记点
      ctx.fillStyle = '#2de0c0';
      ctx.beginPath(); ctx.arc(sx, sy, 3, 0, 7); ctx.fill();
      // 文字 + 底衬
      var tw = ctx.measureText(f.text).width;
      ctx.fillStyle = 'rgba(6,12,18,0.78)';
      ctx.fillRect(sx - tw / 2 - 6, sy - 70, tw + 12, 17);
      ctx.fillStyle = '#ffe0e0';
      ctx.fillText(f.text, sx, sy - 58);
    }
  }

  function L2W(lx, ly, body) {
    var c = Math.cos(body.angle), s = Math.sin(body.angle);
    return { x: body.position.x + lx * c - ly * s, y: body.position.y + lx * s + ly * c };
  }
  function drawWheel(wb) {
    var sx = W2Sx(wb.position.x), sy = W2Sy(wb.position.y), R = PARAMS.WHEEL_R * scale();
    ctx.lineWidth = 2.2; ctx.strokeStyle = '#8a9097';
    ctx.beginPath(); ctx.arc(sx, sy, R, 0, 7); ctx.stroke();
    ctx.strokeStyle = 'rgba(180,190,200,0.5)'; ctx.lineWidth = 1;
    for (var k = 0; k < 6; k++) {
      var a = wb.angle + k * Math.PI / 3;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx + Math.cos(a) * R, sy + Math.sin(a) * R); ctx.stroke();
    }
  }
  function drawBike() {
    var ch = bike.chassis;
    drawWheel(bike.rear); drawWheel(bike.front);
    // 车架（红）
    var rearAxle = L2W(-PARAMS.WHEELBASE / 2, 8, ch);
    var frontAxle = L2W(PARAMS.WHEELBASE / 2, 8, ch);
    var seat = L2W(-10, -8, ch);
    var bar = L2W(PARAMS.WHEELBASE / 2 - 4, -14, ch);
    var eng = L2W(0, 2, ch);
    function line(a, b, w, col) {
      ctx.strokeStyle = col; ctx.lineWidth = w; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(W2Sx(a.x), W2Sy(a.y)); ctx.lineTo(W2Sx(b.x), W2Sy(b.y)); ctx.stroke();
    }
    line(rearAxle, eng, 3.5, '#ff3b3b');
    line(eng, seat, 3.5, '#ff3b3b');
    line(eng, frontAxle, 3, '#ff3b3b');
    line(seat, bar, 3, '#ff5a5a');
    line(frontAxle, bar, 3, '#cfd8dc');
    // 骑手（灰）
    var hp = bike.head.position;
    var hipsW = L2W(-6, -10, ch);
    var shW = L2W(2, -22, ch);
    line(hipsW, shW, 3, '#cfd8dc');
    line(shW, { x: hp.x, y: hp.y }, 3, '#cfd8dc');
    line(shW, bar, 3, '#aeb6bd');                 // 手臂
    line(hipsW, rearAxle, 3, '#aeb6bd');           // 腿
    ctx.fillStyle = '#e53935';
    ctx.beginPath(); ctx.arc(W2Sx(hp.x), W2Sy(hp.y), bike.head.circleRadius * scale(), 0, 7); ctx.fill();
  }

  var dust = [];
  function spawnDust() {
    if (!bike || groundCount === 0) return;
    var sp = Math.abs(bike.chassis.velocity.x);
    if (sp < 2) return;
    var p = bike.rear.position;
    dust.push({ x: p.x, y: p.y + PARAMS.WHEEL_R, vx: -sp * 0.3 - Math.random(), vy: -Math.random() * 1.2, life: 1 });
    if (dust.length > 60) dust.shift();
  }
  function drawDust() {
    for (var i = dust.length - 1; i >= 0; i--) {
      var d = dust[i]; d.x += d.vx; d.y += d.vy; d.vy += 0.05; d.life -= 0.04;
      if (d.life <= 0) { dust.splice(i, 1); continue; }
      ctx.fillStyle = 'rgba(120,140,150,' + (d.life * 0.4) + ')';
      ctx.beginPath(); ctx.arc(W2Sx(d.x), W2Sy(d.y), 2 * scale() * d.life + 1, 0, 7); ctx.fill();
    }
  }

  /* ===================== HUD ===================== */
  var elIdx, elArrow, elDist, elPeak, elStatus;
  function updateHUD() {
    if (!bike) return;
    var v = valueAtX(bike.chassis.position.x);
    var prev = elIdx._v || v;
    var dir = v > prev + 0.5 ? 1 : (v < prev - 0.5 ? -1 : lastDir);
    lastDir = dir; elIdx._v = v;
    elIdx.textContent = fmt(v);
    elIdx.style.color = dir >= 0 ? '#ff5b5b' : '#19c37d'; // A股：红涨绿跌
    elArrow.textContent = dir >= 0 ? '▲' : '▼';
    elArrow.style.color = elIdx.style.color;
    var dist = Math.max(0, (bike.chassis.position.x - startX) / 12);
    elDist.textContent = fmt(dist);
    var peak = Math.max(bestPeak, v); bestPeak = peak;
    elPeak.textContent = fmt(peak);
    elStatus.textContent = groundCount > 0 ? '在路上' : '腾空中';
    elStatus.style.color = groundCount > 0 ? '#7a8590' : '#ffd34d';
  }
  var bestPeak = 0;

  /* ===================== 音效（轻量，首次交互后启动） ===================== */
  var ac = null, eng = null, engGain = null, muted = false;
  function initAudio() {
    if (ac || muted) return;
    try {
      ac = new (window.AudioContext || window.webkitAudioContext)();
      eng = ac.createOscillator(); eng.type = 'sawtooth'; eng.frequency.value = 60;
      engGain = ac.createGain(); engGain.gain.value = 0;
      var f = ac.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 700;
      eng.connect(f); f.connect(engGain); engGain.connect(ac.destination); eng.start();
    } catch (e) { ac = null; }
  }
  function updateAudio() {
    if (!ac || muted) return;
    try {
      if (ac.state === 'suspended') ac.resume();
      var sp = bike ? Math.abs(bike.chassis.velocity.x) : 0;
      var target = (input.gas && state === 'playing') ? 0.06 : 0.015;
      if (state !== 'playing') target = 0;
      engGain.gain.value += (target - engGain.gain.value) * 0.1;
      eng.frequency.value += (60 + sp * 22 - eng.frequency.value) * 0.15;
    } catch (e) {}
  }
  function soundCrash() {
    if (!ac || muted) return;
    try {
      var o = ac.createOscillator(), g = ac.createGain();
      o.type = 'square'; o.frequency.setValueAtTime(180, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(40, ac.currentTime + 0.3);
      g.gain.setValueAtTime(0.12, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.35);
      o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime + 0.36);
    } catch (e) {}
  }

  /* ===================== 主循环 ===================== */
  function loop() {
    if (state === 'playing') {
      applyControls();
      Engine.update(engine, 1000 / 60);
      clampSpeed(bike.chassis); clampSpeed(bike.rear); clampSpeed(bike.front);
      // 相机
      var s = scale();
      var tx = bike.chassis.position.x - W * 0.32 / s;
      var ty = bike.chassis.position.y - H * 0.5 / s;
      cam.x += (tx - cam.x) * 0.12; cam.y += (ty - cam.y) * 0.10;
      spawnDust(); updateHUD();
      // 终点 / 坠落
      if (bike.chassis.position.x > finishX) win();
      if (bike.chassis.position.y > maxGroundY + 500) crash('掉出 K 线了，永久离场 👋');
      if (groundCount === 0) airTime += 1 / 60; else airTime = 0;
    }
    updateAudio();
    render();
    requestAnimationFrame(loop);
  }

  /* ===================== 输入绑定 ===================== */
  var btnGas, btnBrake, coachEl, coachTimer = null;
  function setGas(on) { input.gas = on; if (btnGas) btnGas.classList.toggle('on', on); if (on) dismissCoach(); }
  function setBrake(on) { input.brake = on; if (btnBrake) btnBrake.classList.toggle('on', on); if (on) dismissCoach(); }
  function dismissCoach() {
    if (coachEl) coachEl.style.display = 'none';
    if (btnGas) btnGas.classList.remove('pulse');
    if (btnBrake) btnBrake.classList.remove('pulse');
    if (coachTimer) { clearTimeout(coachTimer); coachTimer = null; }
  }
  function showCoach() {
    if (coachEl) coachEl.style.display = 'flex';
    if (btnGas) btnGas.classList.add('pulse');
    if (btnBrake) btnBrake.classList.add('pulse');
    if (coachTimer) clearTimeout(coachTimer);
    coachTimer = setTimeout(dismissCoach, 5000);
  }

  function bindInput() {
    window.addEventListener('keydown', function (e) {
      if (e.repeat) return;
      var k = e.key.toLowerCase();
      if (k === 'arrowright' || k === 'd' || k === ' ') { setGas(true); e.preventDefault(); }
      if (k === 'arrowleft' || k === 'a' || k === 'arrowdown') { setBrake(true); e.preventDefault(); }
      if (k === 'r') { startGame(); }
      if ((state === 'ready') && (k === ' ' || k === 'enter')) startGame();
    });
    window.addEventListener('keyup', function (e) {
      var k = e.key.toLowerCase();
      if (k === 'arrowright' || k === 'd' || k === ' ') setGas(false);
      if (k === 'arrowleft' || k === 'a' || k === 'arrowdown') setBrake(false);
    });

    var zoneL = document.getElementById('zoneL');
    var zoneR = document.getElementById('zoneR');
    function press(which, on) { if (which === 'L') setBrake(on); else setGas(on); }
    function bindZone(el, which) {
      el.addEventListener('touchstart', function (e) { press(which, true); e.preventDefault(); }, { passive: false });
      el.addEventListener('touchend', function (e) { press(which, false); e.preventDefault(); }, { passive: false });
      el.addEventListener('touchcancel', function () { press(which, false); });
      el.addEventListener('mousedown', function () { press(which, true); });
      el.addEventListener('mouseup', function () { press(which, false); });
      el.addEventListener('mouseleave', function () { press(which, false); });
    }
    bindZone(zoneL, 'L'); bindZone(zoneR, 'R');

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('retryBtn').addEventListener('click', startGame);
    document.getElementById('muteBtn').addEventListener('click', function () {
      muted = !muted;
      this.textContent = muted ? '🔇' : '🔊';
      if (muted && engGain) try { engGain.gain.value = 0; } catch (e) {}
    });
  }

  /* ===================== 覆盖层 ===================== */
  function hideOverlays() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('crashScreen').style.display = 'none';
  }
  function showCrash() {
    dismissCoach();
    saveBest();
    document.getElementById('crashTitle').textContent = state === 'win' ? '逃顶成功 🏁' : '收盘 / 爆仓';
    document.getElementById('crashMsg').textContent = crashMsg;
    var dist = Math.max(0, (bike.chassis.position.x - startX) / 12);
    document.getElementById('crashDist').textContent = fmt(dist);
    document.getElementById('crashPeak').textContent = fmt(bestPeak);
    document.getElementById('crashScreen').style.display = 'flex';
  }
  function saveBest() {
    var dist = Math.max(0, (bike.chassis.position.x - startX) / 12);
    if (dist > bestDist) { bestDist = dist; try { localStorage.setItem('huzhi_best', String(Math.round(dist))); } catch (e) {} }
  }
  function loadBest() {
    try { var b = localStorage.getItem('huzhi_best'); if (b) { bestDist = +b; document.getElementById('bestLabel').textContent = '最远 ' + fmt(bestDist) + ' 米'; } } catch (e) {}
  }

  /* ===================== 初始化 ===================== */
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  }
  function init() {
    canvas = document.getElementById('game');
    ctx = canvas.getContext('2d');
    elIdx = document.getElementById('hudIdx');
    elArrow = document.getElementById('hudArrow');
    elDist = document.getElementById('hudDist');
    elPeak = document.getElementById('hudPeak');
    elStatus = document.getElementById('hudStatus');
    btnGas = document.getElementById('btnGas');
    btnBrake = document.getElementById('btnBrake');
    coachEl = document.getElementById('coach');
    resize();
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', function () { setTimeout(resize, 200); });

    engine = Engine.create();
    world = engine.world;
    engine.gravity.y = PARAMS.GRAVITY;
    wireEvents();
    bindInput();
    loadBest();

    // 预览赛道（开始前先建一份，让背景有内容）
    buildTerrain();
    cam.x = points[0].x - 100; cam.y = points[0].y - H * 0.4 / scale();
    requestAnimationFrame(loop);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
